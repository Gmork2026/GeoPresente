<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoPresente - Control de Acceso</title>
    <style>
        :root {
            --primary: #0f172a;
            --btn-ingreso: #10b981;
            --btn-salida: #ef4444;
            --bg-color: #f8fafc;
            --btn-neutral: #3b82f6;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            /* FIX VISUAL: Eliminamos el centrado vertical absoluto y lo anclamos arriba con un margen */
            display: block; 
        }
        .app-container {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin: 5vh auto 0 auto; /* 5vh de separación desde arriba */
            text-align: center;
            box-sizing: border-box;
        }
        h2 { color: var(--primary); margin-top: 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 14px; font-weight: 600; color: #475569; display: block; margin-bottom: 6px; }
        input[type="number"] {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0; 
            border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none;
        }
        input[type="number"]:focus { border-color: var(--primary); }
        .video-container {
            width: 100%; height: 280px; background: #e2e8f0;
            border-radius: 8px; overflow: hidden; margin-bottom: 15px;
            position: relative;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1; padding: 14px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; color: white; cursor: pointer;
            transition: opacity 0.2s; width: 100%;
        }
        button:active { opacity: 0.8; }
        .btn-ingreso { background-color: var(--btn-ingreso); }
        .btn-salida { background-color: var(--btn-salida); }
        .btn-continuar { background-color: var(--btn-neutral); margin-top: 10px;}
        .status-badge {
            display: inline-block; padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: bold; margin-bottom: 15px;
            background: #f1f5f9; color: #64748b;
        }
        /* Control de vistas de los pasos */
        #paso-2 { display: none; } 
    </style>
</head>
<body>

<div class="app-container">
    <h2>GeoPresente</h2>

    <!-- PASO 1: Identificación -->
    <div id="paso-1">
        <p id="instruccion-paso1" style="color: #64748b; font-size: 14px; margin-bottom: 20px;">Por favor, identifícate para comenzar.</p>
        
        <div class="input-group">
            <label for="legajo">Número de Legajo</label>
            <input type="number" id="legajo" placeholder="Ej: 1045" required>
        </div>

        <!-- DIV OCULTO: Solo aparece si el legajo es nuevo -->
        <div id="div-registro" style="display: none; margin-top: 15px; background: #f1f5f9; padding: 15px; border-radius: 8px; border: 1px dashed #cbd5e1;">
            <p style="color: #ef4444; font-weight: bold; margin-top: 0; font-size: 14px;">Legajo no encontrado. Completa tus datos:</p>
            
            <label for="nombre_nuevo">Nombre y Apellido</label>
            <input type="text" id="nombre_nuevo" placeholder="Ej: Juan Pérez" style="margin-bottom: 15px;">

            <label for="dni_nuevo">Número de DNI</label>
            <input type="number" id="dni_nuevo" placeholder="Sin puntos, ej: 35123456">
        </div>

        <button id="btn-validar" class="btn-continuar" onclick="validarLegajo()">Continuar</button>
    </div>

    <!-- PASO 2: Biometría y Marcación (Oculto por defecto) -->
    <div id="paso-2">
        <div id="gps-status" class="status-badge">⏳ Iniciando sensores...</div>
        
        <div class="video-container">
            <video id="camera" autoplay playsinline></video>
        </div>
        <canvas id="snapshot" style="display: none;"></canvas>

        <div class="btn-container">
            <button class="btn-ingreso" onclick="procesarMarcacion('INGRESO')">INGRESO</button>
            <button class="btn-salida" onclick="procesarMarcacion('SALIDA')">SALIDA</button>
        </div>
    </div>
</div>

<script>
    // Variables globales
    let gpsLocation = { lat: null, lon: null };
    let esUsuarioNuevo = false;
    
    // ⚠️ REEMPLAZA ESTO CON TU URL DE RENDER
    const BASE_API_URL = "https://TU-URL-DE-RENDER.onrender.com"; 

    // --- 1. LÓGICA DE VALIDACIÓN ---
    async function validarLegajo() {
        const legajoInput = document.getElementById('legajo').value;
        const btnValidar = document.getElementById('btn-validar');
        const instruccion = document.getElementById('instruccion-paso1');
        
        if (!legajoInput) return alert("El legajo es obligatorio.");

        // Si ya determinamos que es nuevo y le pedimos el nombre, avanzamos
        if (esUsuarioNuevo) {
            const nombreInput = document.getElementById('nombre_nuevo').value;
            const dniInput = document.getElementById('dni_nuevo').value;
            
            if (!nombreInput || !dniInput) {
                return alert("Por favor, ingresa tu nombre y tu DNI para registrarte.");
            }
            avanzarAlPaso2(`Bienvenido, ${nombreInput}`);
            return;
        }

        btnValidar.innerText = "⏳ Validando...";
        btnValidar.disabled = true;

        try {
            // Consultamos al backend
            const response = await fetch(`${BASE_API_URL}/api/validar/${legajoInput}`);
            const data = await response.json();

            if (data.existe) {
                // El vigilador existe
                avanzarAlPaso2(`Hola, ${data.nombre}`);
            } else {
                // El vigilador NO existe
                esUsuarioNuevo = true;
                instruccion.innerText = "Necesitamos registrarte en el sistema.";
                document.getElementById('div-registro').style.display = "block"; // Cambiamos a div-registro
                document.getElementById('legajo').disabled = true; 
                btnValidar.innerText = "Continuar y Activar Cámara";
                btnValidar.disabled = false;
            }
        } catch (error) {
            console.error(error);
            alert("Error al conectar con la base de datos.");
            btnValidar.innerText = "Continuar";
            btnValidar.disabled = false;
        }
    }

    function avanzarAlPaso2(mensajeBienvenida) {
        document.getElementById('paso-1').style.display = 'none';
        document.getElementById('paso-2').style.display = 'block';
        
        // Agregamos un saludito arriba de la cámara
        const saludo = document.createElement('h3');
        saludo.innerText = mensajeBienvenida;
        saludo.style.color = "#0f172a";
        saludo.style.marginTop = "0";
        document.getElementById('paso-2').prepend(saludo);

        iniciarCamara();
        iniciarGPS();
    }

    // --- 2. MANEJO DE SENSORES ---
    async function iniciarCamara() {
        const video = document.getElementById('camera');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
        } catch (err) {
            alert("Se requiere acceso a la cámara para dar el presente.");
        }
    }

    function iniciarGPS() {
        const statusBadge = document.getElementById('gps-status');
        if ("geolocation" in navigator) {
            statusBadge.innerText = "⏳ Buscando señal GPS...";
            navigator.geolocation.watchPosition(
                (position) => {
                    gpsLocation.lat = position.coords.latitude;
                    gpsLocation.lon = position.coords.longitude;
                    statusBadge.innerText = "✅ GPS Localizado";
                    statusBadge.style.color = "#10b981";
                    statusBadge.style.background = "#d1fae5";
                },
                (error) => {
                    statusBadge.innerText = "❌ Error de GPS";
                    statusBadge.style.color = "#ef4444";
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }
    }

    // --- 3. PROCESAMIENTO DE MARCACIÓN ---
    async function procesarMarcacion(tipo) {
        if (!gpsLocation.lat) return alert("Aguarde un momento, buscando señal GPS...");

        const video = document.getElementById('camera');
        const canvas = document.getElementById('snapshot');
        const context = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const payload = {
            legajo: parseInt(document.getElementById('legajo').value),
            nombre_nuevo: esUsuarioNuevo ? document.getElementById('nombre_nuevo').value : null,
            dni_nuevo: esUsuarioNuevo ? document.getElementById('dni_nuevo').value : null, // <-- DNI agregado aquí
            tipo_marcacion: tipo,
            latitud_celular: gpsLocation.lat,
            longitud_celular: gpsLocation.lon,
            selfie_b64: canvas.toDataURL('image/jpeg', 0.7)
        };

        const statusBadge = document.getElementById('gps-status');
        statusBadge.innerText = "⏳ Subiendo datos...";

        try {
            const response = await fetch(`${BASE_API_URL}/api/marcar`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await response.json();

            if (response.ok) {
                alert(`¡${tipo} exitoso!\nServicio: ${data.data.descripcion_servicio}`);
                window.location.reload(); 
            } else {
                alert(`Error: ${data.detail || 'Fallo de conexión'}`);
            }
        } catch (error) {
            alert("Error conectando con el servidor central.");
        }
        statusBadge.innerText = "✅ GPS Localizado";
    }
</script>

</body>
</html>
